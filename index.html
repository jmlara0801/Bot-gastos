];

let pendingData = null;
let imageBase64 = null;
let imageMime = "image/jpeg";
let imageDataUrl = null;
let appState = "idle";
let editField = null;

const today = new Date();
const formatDate = d => `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;

window.onload = () => {
  addBot("¡Hola Miguel! 👋 Soy tu asistente de gastos.\n\nPuedes:\n• 📷 Subir una foto de un recibo o boleta\n• ✍️ Escribir un gasto manualmente\n\n¿Cómo empezamos?");

// ── UI ────────────────────────────────
function addBot(text, loading=false) {
  const wrap = document.createElement("div");
  wrap.className = "bot-msg";
  const av = document.createElement("div");
  av.className = "bot-avatar"; av.textContent = "💰";
  const bubble = document.createElement("div");
  bubble.className = "bot-bubble";
  if (loading) {
    bubble.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    wrap.id = "loading-bubble";
  } else { bubble.textContent = text; }
  wrap.appendChild(av); wrap.appendChild(bubble);
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function removeLoading() {
  const el = document.getElementById("loading-bubble");
  if (el) el.remove();
}

function addUser(text, imgSrc=null) {
  const wrap = document.createElement("div"); wrap.className = "user-msg";
  const bubble = document.createElement("div"); bubble.className = "user-bubble";
  if (imgSrc) { const img = document.createElement("img"); img.src = imgSrc; bubble.appendChild(img); }
  if (text) bubble.appendChild(document.createTextNode(text));
  wrap.appendChild(bubble);
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function scrollBottom() { setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 80); }
function autoResize(el) { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,120)+"px"; updateSendBtn(); }
function updateSendBtn() { document.getElementById("send-btn").disabled = !document.getElementById("text-input").value.trim() && !imageBase64; }

// ── Image ─────────────────────────────
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  imageMime = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = ev => {
    imageDataUrl = ev.target.result;
    imageBase64 = imageDataUrl.split(",")[1];
    document.getElementById("preview-img").src = imageDataUrl;
    document.getElementById("image-preview").style.display = "flex";
    updateSendBtn();
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  imageBase64=null; imageDataUrl=null;
  document.getElementById("image-preview").style.display="none";
  document.getElementById("file-input").value="";
  updateSendBtn();
}

// ── Send ──────────────────────────────
async function handleSend() {
  const text = document.getElementById("text-input").value.trim();
  if (!text && !imageBase64) return;

  // Si hay un campo en edición, aplicar el valor directamente
  if (editField) {
    addUser(text);
    document.getElementById("text-input").value = "";
    pendingData[editField] = editField==="importe" ? parseFloat(text) : text;
    editField = null; appState = "confirm";
    addBot("✔ Actualizado. Confirma el registro:");
    showConfirmCard(); updateSendBtn(); return;
  }

  // Si hay gasto pendiente y escribe texto sin imagen nueva → interpretar como corrección
  if (appState === "confirm" && pendingData && !imageBase64) {
    addUser(text);
    document.getElementById("text-input").value = "";
    updateSendBtn();
    addBot("", true);
    try {
      // Buscar rubros que coincidan con la instrucción del usuario
      const instruccionLower = text.toLowerCase();
      const palabras = instruccionLower.split(" ").filter(w => w.length > 3);
      const rubrosCoincidentes = RUBROS.filter(r =>
        palabras.some(w => r.r1.toLowerCase().includes(w) || r.r2.toLowerCase().includes(w))
      );

      if (rubrosCoincidentes.length === 0) {
        // Usar Gemini solo para identificar el número de rubro — NO para cambiar otros campos
        const listaRubrosCorr = RUBROS.map((r,i) => `${i+1}. "${r.r1}" | ${r.r2} | ${r.tipo} | ${r.nombre}`).join("\n");
        const prompt = "El usuario quiere cambiar el rubro de un gasto a: \"" + text + "\".\n" +
          "Lista de rubros disponibles:\n" + listaRubrosCorr + "\n" +
          "Si hay UNA opción clara devuelve solo su número (ej: 6).\n" +
          "Si hay VARIAS opciones posibles devuelve los números separados por coma (ej: 4,5).\n" +
          "Devuelve SOLO el número o números, sin texto adicional.";
        const resp = await callGemini([{text: prompt}]);
        const indices = resp.trim().split(",").map(n => parseInt(n.trim()) - 1).filter(n => !isNaN(n) && n >= 0 && n < RUBROS.length);
        const coincidencias = indices.map(i => RUBROS[i]).filter(Boolean);
        removeLoading();
        if (coincidencias.length === 1) {
          // Solo actualizar rubro — NO tocar descripcion, importe ni fecha
          pendingData.rubro1 = coincidencias[0].r1;
          pendingData.rubro2 = coincidencias[0].r2;
          pendingData.tipo = coincidencias[0].tipo;
          pendingData.nombre = coincidencias[0].nombre;
          addBot("✔ Rubro actualizado. Confirma el registro:");
          showConfirmCard();
        } else if (coincidencias.length > 1) {
          mostrarOpcionesRubro(coincidencias);
        } else {
          addBot("No encontré ese rubro. Elige de la lista:");
          showRubroSelector();
        }
      } else if (rubrosCoincidentes.length === 1) {
        // Solo una coincidencia — actualizar SOLO rubro, no tocar importe ni descripcion
        pendingData.rubro1 = rubrosCoincidentes[0].r1;
        pendingData.rubro2 = rubrosCoincidentes[0].r2;
        pendingData.tipo = rubrosCoincidentes[0].tipo;
        pendingData.nombre = rubrosCoincidentes[0].nombre;
        removeLoading();
        addBot("✔ Rubro actualizado. Confirma el registro:");
        showConfirmCard();
      } else {
        // Múltiples coincidencias — preguntar sin tocar nada
        removeLoading();
        mostrarOpcionesRubro(rubrosCoincidentes);
      }
    } catch(err) {
      removeLoading();
      addBot("No pude interpretar la corrección. Usa el botón ✏️ Editar para cambiar campos específicos.");
      showConfirmCard();
    }
    return;
  }

  addUser(text, imageDataUrl);
  const b64 = imageBase64; const mime = imageMime;
  document.getElementById("text-input").value = "";
  clearImage(); updateSendBtn();
  addBot("", true);

  try {
    const extracted = b64 ? await analyzeImage(b64, mime, text) : await analyzeText(text);
    removeLoading();
    pendingData = extracted; appState = "confirm";
    addBot(extracted.confianza==="baja" ? "⚠️ Confianza baja, revisa los datos:" : "Aquí está lo que encontré:");
    showConfirmCard();
  } catch(err) {
    removeLoading();
    addBot("❌ Error: " + err.message);
  }
}

// ── Gemini API ────────────────────────
async function callGemini(parts) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { temperature: 0.1 }
    })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return txt.replace(/```json|```/g,"").trim();
}

async function analyzeImage(b64, mime, userText) {
  const listaRubros = RUBROS.map((r,i) => `${i+1}. rubro1="${r.r1}" rubro2="${r.r2}" tipo="${r.tipo}" nombre="${r.nombre}"`).join("\n");
  const prompt = `Analiza este comprobante de gasto y devuelve SOLO un JSON válido sin backticks:
{"fecha":"DD/MM/YYYY","descripcion":"texto corto","importe":numero,"rubro1":"...","rubro2":"...","tipo":"...","nombre":"...","confianza":"alta o media o baja"}
Hoy: ${formatDate(today)}. Egresos con importe NEGATIVO. Ingresos POSITIVO.
CRÍTICO: Para rubro1, rubro2, tipo y nombre DEBES elegir UNA fila completa de esta lista. No puedes inventar ni mezclar valores de filas distintas:
${listaRubros}
${userText ? `Nota del usuario: "${userText}"` : ""}`;

  const txt = await callGemini([
    { inline_data: { mime_type: mime, data: b64 } },
    { text: prompt }
  ]);
  return JSON.parse(txt);
}

  const listaRubros2 = RUBROS.map((r,i) => `${i+1}. rubro1="${r.r1}" rubro2="${r.r2}" tipo="${r.tipo}" nombre="${r.nombre}"`).join("\n");
  const prompt = `El usuario describe un gasto: "${userText}"
Devuelve SOLO un JSON válido sin backticks:

// ── Confirm card ──────────────────────
function showConfirmCard() {
  const d = pendingData;
  const card = document.createElement("div");
  card.className = "confirm-card"; card.id = "confirm-card";
  const rows = [
    ["📅 Fecha", d.fecha], ["📝 Descripción", d.descripcion],
    ["💵 Importe", `S/ ${Math.abs(d.importe)}`],
    ["🏷️ Rubro 1", d.rubro1], ["📂 Rubro 2", d.rubro2],
    ["↕️ Tipo", d.tipo], ["👤 Nombre", d.nombre],
  ];
  card.innerHTML = `<div class="confirm-title">✅ Confirma el registro:</div>` +
    rows.map(([k,v])=>`<div class="confirm-row"><span>${k}</span><span>${v}</span></div>`).join("") +
    `<div class="btn-row">
      <button class="btn-confirm" onclick="doConfirm()">✅ Registrar</button>
      <button class="btn-edit" onclick="showEditOptions()">✏️ Editar</button>
      <button class="btn-cancel" onclick="cancelConfirm()">✕</button>
    </div>`;
  document.getElementById("messages").appendChild(card);
  scrollBottom();
}

function removeCard(id) { const el=document.getElementById(id); if(el) el.remove(); }

// ── Register ──────────────────────────
async function doConfirm() {
  removeCard("confirm-card"); removeCard("edit-options");
  const data = pendingData; pendingData = null; appState = "idle";
  // Corregir fecha: Gemini a veces devuelve MM/DD en vez de DD/MM
  // Parsear fecha DD/MM/YYYY y convertir a YYYY-MM-DD para que Google no invierta día/mes
  let partes = data.fecha.split("/");
  let dia = parseInt(partes[0]);
  let mes = parseInt(partes[1]);
  let año = parseInt(partes[2]);
  // Formato ISO para evitar ambigüedad en Google Sheets
  const fechaISO = `${año}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
  // Concatenar lo deja vacío — Google Sheet lo calcula
  const params = new URLSearchParams({
    fecha: fechaISO, mes: mes, año: año,
    descripcion: data.descripcion, importe: data.importe,
    rubro1: data.rubro1, rubro2: data.rubro2, tipo: data.tipo, nombre: data.nombre
  });
  addBot("", true);
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
    const json = await res.json();
    removeLoading();
    if (json.status==="OK") {
      addBot(`✅ ¡Registrado en tu planilla!\n\n📊 ${data.descripcion} — S/ ${Math.abs(data.importe)}\n🏷️ ${data.rubro1} · ${data.nombre}\n📅 ${data.fecha}\n\n¿Tienes otro gasto?`);
    } else {
      addBot(`⚠️ Error del script: ${json.mensaje}`);
    }
  } catch(err) {
    removeLoading();
    addBot(`⚠️ No se pudo conectar al script.\n\nCopia manualmente:\n${data.fecha} | ${data.descripcion} | S/${Math.abs(data.importe)} | ${data.rubro1} | ${data.nombre}`);
  }
}

function cancelConfirm() { removeCard("confirm-card"); pendingData=null; appState="idle"; addBot("Cancelado. ¿Qué más necesitas?"); }

// ── Edit ──────────────────────────────
function showEditOptions() {
  removeCard("confirm-card"); appState="edit";
  const opts = document.createElement("div"); opts.className="edit-options"; opts.id="edit-options";
  ["fecha","descripcion","importe","nombre"].forEach(f=>{
    const btn=document.createElement("button"); btn.className="edit-opt";
    btn.textContent=`Cambiar ${f}`;
    btn.onclick=()=>{ removeCard("edit-options"); editField=f; addBot(`Escribe el nuevo valor para ${f}:`); };
    opts.appendChild(btn);
  });
  const rb=document.createElement("button"); rb.className="edit-opt"; rb.textContent="Cambiar rubro";
  rb.onclick=()=>{ removeCard("edit-options"); showRubroSelector(); }; opts.appendChild(rb);
  const bk=document.createElement("button"); bk.className="btn-cancel"; bk.style.marginTop="4px"; bk.textContent="Volver";
  bk.onclick=()=>{ removeCard("edit-options"); appState="confirm"; showConfirmCard(); }; opts.appendChild(bk);
  document.getElementById("messages").appendChild(opts); scrollBottom();
}

// ── Opciones de rubro ambiguo ─────────────────
function mostrarOpcionesRubro(opciones) {
  addBot("Encontré varias opciones, ¿cuál es la correcta?");
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin:4px 0 10px 44px;display:flex;flex-direction:column;gap:6px;";
  wrap.id = "opciones-rubro";
  opciones.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "edit-opt";
    btn.innerHTML = `<strong>${r.r1}</strong> · ${r.r2} · ${r.nombre}`;
    btn.onclick = () => {
      removeCard("opciones-rubro");
      Object.assign(pendingData, {rubro1: r.r1, rubro2: r.r2, tipo: r.tipo, nombre: r.nombre});
      appState = "confirm";
      addBot("✔ Rubro asignado. Confirma el registro:");
      showConfirmCard();
    };
    wrap.appendChild(btn);
  });
  // Botón para abrir selector completo
  const btnTodos = document.createElement("button");
  btnTodos.className = "btn-cancel";
  btnTodos.textContent = "Ver todos los rubros";
  btnTodos.style.marginTop = "4px";
  btnTodos.onclick = () => { removeCard("opciones-rubro"); showRubroSelector(); };
  wrap.appendChild(btnTodos);
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

// ── Rubro selector ────────────────────
function showRubroSelector() {
  appState="rubro";
  const wrap=document.createElement("div"); wrap.className="rubro-selector"; wrap.id="rubro-selector";
  const inp=document.createElement("input"); inp.className="rubro-search"; inp.placeholder="Buscar rubro...";
  const list=document.createElement("div"); list.className="rubro-list";
  inp.oninput=()=>renderRubros(list,inp.value);
  wrap.appendChild(inp); wrap.appendChild(list);
  const cancel=document.createElement("button"); cancel.className="btn-cancel"; cancel.style.marginTop="6px"; cancel.textContent="Cancelar";
  cancel.onclick=()=>{ removeCard("rubro-selector"); appState="confirm"; showConfirmCard(); }; wrap.appendChild(cancel);
  document.getElementById("messages").appendChild(wrap);
  renderRubros(list,""); scrollBottom();
}

function renderRubros(container, search) {
  container.innerHTML="";
  RUBROS.filter(r=>r.r1.toLowerCase().includes(search.toLowerCase())||r.r2.toLowerCase().includes(search.toLowerCase()))
  .forEach(r=>{
    const btn=document.createElement("button"); btn.className="rubro-item";
    btn.innerHTML=`<span class="rubro-name">${r.r1}</span> · ${r.r2} · ${r.tipo} · ${r.nombre}`;
    btn.onclick=()=>{
      pendingData.rubro1=r.r1; pendingData.rubro2=r.r2; pendingData.tipo=r.tipo; pendingData.nombre=r.nombre;
      removeCard("rubro-selector"); appState="confirm"; addBot("Rubro actualizado:"); showConfirmCard();
    };
    container.appendChild(btn);
  });
}
